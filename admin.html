<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – QuocHuy.MMO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1321;
      --bg-soft: #111827;
      --card: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.22);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --blue2: #6366f1;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
    }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: radial-gradient(circle at top left, rgba(56,189,248,.18), transparent 22%), radial-gradient(circle at bottom right, rgba(99,102,241,.16), transparent 18%), linear-gradient(180deg, #08101f 0%, #0d1321 100%); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .topbar { background: rgba(15, 23, 42, 0.96); border-bottom: 1px solid rgba(148, 163, 184, 0.15); padding: 18px 26px; display: flex; justify-content: space-between; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 20; backdrop-filter: blur(10px); }
    .topbar .brand { display: flex; align-items: center; gap: 14px; font-weight: 700; }
    .topbar .brand .logo { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--blue), var(--blue2)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; box-shadow: 0 18px 40px rgba(56,189,248,0.25); }
    .topbar .brand .brand-title { font-size: 16px; letter-spacing: .03em; }
    .topbar .brand .brand-meta { font-size: 12px; color: #cbd5e1; }
    .topbar .actions { display: flex; align-items: center; gap: 10px; }
    .topbar button, .topbar a.button-link { border: 1px solid rgba(148, 163, 184, 0.22); background: rgba(15, 23, 42, 0.82); color: var(--text); padding: 12px 16px; border-radius: 14px; cursor: pointer; transition: all .25s ease; }
    .topbar button:hover, .topbar a.button-link:hover { transform: translateY(-1px); border-color: var(--blue); color: #fff; }
    .admin-wrap { max-width: 1200px; margin: 32px auto; padding: 0 20px 48px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; backdrop-filter: blur(12px); }
    .stat-card .icon { width: 48px; height: 48px; margin: 0 auto 12px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .stat-card .icon.primary { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: white; }
    .stat-card .icon.success { background: linear-gradient(135deg, var(--success), #22c55e); color: white; }
    .stat-card .icon.danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
    .stat-card .icon.warning { background: linear-gradient(135deg, var(--warning), #f59e0b); color: white; }
    .stat-card .value { font-size: 32px; font-weight: 800; margin: 8px 0 4px; }
    .stat-card .label { color: var(--muted); font-size: 13px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .admin-note { background: linear-gradient(180deg, rgba(56,189,248,.12), rgba(15,23,42,.95)); border: 1px solid rgba(56,189,248,.18); border-radius: 12px; padding: 16px; margin-bottom: 24px; backdrop-filter: blur(12px); }
    .admin-note i { margin-right: 8px; color: var(--blue); }
    .users-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; backdrop-filter: blur(12px); }
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th { background: rgba(15, 23, 42, 0.6); color: var(--text); padding: 16px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
    .users-table td { padding: 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    .users-table tr:hover { background: rgba(56,189,248,.08); }
    .empty-state { text-align: center; padding: 32px; color: var(--muted); font-style: italic; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
    .search-bar input { flex: 1; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; }
    .search-bar input:focus { outline: none; border-color: var(--blue); }
    .role-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .role-badge.role-user { background: rgba(148, 163, 184, 0.2); color: var(--muted); }
    .role-badge.role-premium { background: linear-gradient(135deg, rgba(251,191,36,.2), rgba(245,158,11,.2)); color: var(--warning); }
    .role-badge.role-admin { background: linear-gradient(135deg, rgba(56,189,248,.2), rgba(99,102,241,.2)); color: var(--blue); }
    .role-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .role-btn { padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .2s ease; }
    .role-btn.btn-upgrade { background: linear-gradient(135deg, var(--warning), #f59e0b); color: white; }
    .role-btn.btn-downgrade { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
    .role-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .button-small { padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s ease; }
    .button-small.approve { background: linear-gradient(135deg, var(--success), #22c55e); color: white; }
    .button-small.reject { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
    .button-small.details { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: white; }
    .button-small:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .toast { position: fixed; top: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; color: var(--text); z-index: 1000; opacity: 0; transform: translateY(-20px); transition: all .3s ease; backdrop-filter: blur(12px); }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--danger); background: rgba(248,113,113,.1); }
    .toast i { margin-right: 8px; }
    #toast { display: none; }
    .cloud-status { background: linear-gradient(180deg, rgba(16,185,129,.12), rgba(15,23,42,.95)); border: 1px solid rgba(16,185,129,.18); border-radius: 12px; padding: 16px; margin-bottom: 24px; backdrop-filter: blur(12px); }
    .cloud-status i { margin-right: 8px; }
    .cloud-status.connected { background: linear-gradient(180deg, rgba(16,185,129,.12), rgba(15,23,42,.95)); border-color: rgba(16,185,129,.18); }
    .cloud-status.disconnected { background: linear-gradient(180deg, rgba(239,68,68,.12), rgba(15,23,42,.95)); border-color: rgba(239,68,68,.18); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"><i class="fas fa-crown"></i></div>
      <div>
        <div class="brand-title">QuocHuy.MMO</div>
        <div class="brand-meta">Admin Dashboard</div>
      </div>
    </div>
    <div class="actions">
      <span id="admin-user">Loading...</span>
      <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
    </div>
  </div>

  <div class="admin-wrap">
    <div class="admin-note" id="cloud-status">
      <i class="fas fa-cloud" id="cloud-icon"></i> 
      <span id="cloud-message">Đang kiểm tra kết nối Cloud...</span>
    </div>

    <div class="section-title">Quản lý tài khoản hiện có</div>
    <div class="users-table-wrap">
      <div class="search-bar">
        <input type="text" id="user-search" placeholder="Tìm kiếm theo email, username, role...">
      </div>
      <table class="users-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Username</th>
            <th>Role</th>
            <th>Tham gia</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="5" class="empty-state">Đang tải tài khoản...</td></tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top: 32px;">
      <div class="section-title">Tạo tài khoản mới</div>
      <div class="users-table-wrap">
        <table class="users-table">
          <tr>
            <td><input type="email" id="new-email" placeholder="Email" style="width: 100%; padding: 8px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; color: var(--text);"></td>
            <td><input type="text" id="new-username" placeholder="Username" style="width: 100%; padding: 8px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; color: var(--text);"></td>
            <td>
              <select id="new-role" style="width: 100%; padding: 8px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
                <option value="user">User</option>
                <option value="premium">Premium</option>
                <option value="admin">Admin</option>
              </select>
            </td>
            <td><input type="password" id="new-password" placeholder="Password" style="width: 100%; padding: 8px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; color: var(--text);"></td>
            <td>
              <button class="button-small approve" onclick="createNewUser()">
                <i class="fas fa-plus"></i> Tạo
              </button>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </div>

  <div id="toast"><i class="fas fa-check-circle"></i> <span id="toast-msg"></span></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const firebaseConfig = window.MMO_FIREBASE_CONFIG || {};
    const isFirebaseConfigured = Boolean(
      firebaseConfig.apiKey &&
      firebaseConfig.authDomain &&
      firebaseConfig.projectId
    );
    
    let db = null;
    let auth = null;
    
    if (isFirebaseConfigured && window.firebase) {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      auth = firebase.auth();
      db = firebase.firestore();
    }
    
    const ADMIN_EMAIL = 'admin@quochuy.mmo';
    let usersCache = [];
    
    // Cloud connection status
    function updateCloudStatus(connected, message = '') {
      const statusElement = document.getElementById('cloud-status');
      const iconElement = document.getElementById('cloud-icon');
      const messageElement = document.getElementById('cloud-message');
      
      if (statusElement) {
        if (connected) {
          statusElement.style.background = 'linear-gradient(180deg, rgba(16,185,129,.12), rgba(15,23,42,.95))';
          statusElement.style.borderColor = 'rgba(16,185,129,.18)';
          if (iconElement) iconElement.className = 'fas fa-cloud-check';
          if (messageElement) messageElement.textContent = message || 'Đã kết nối Cloud ✓';
        } else {
          statusElement.style.background = 'linear-gradient(180deg, rgba(239,68,68,.12), rgba(15,23,42,.95))';
          statusElement.style.borderColor = 'rgba(239,68,68,.18)';
          if (iconElement) iconElement.className = 'fas fa-cloud-slash';
          if (messageElement) messageElement.textContent = message || 'Mất kết nối Cloud';
        }
      }
    }
    
    // Test cloud connection
    async function testCloudConnection() {
      if (!db) {
        updateCloudStatus(false, 'Chưa cấu hình Firebase');
        return false;
      }
      
      try {
        const testDoc = await db.collection('connection_test').limit(1).get();
        updateCloudStatus(true, 'Đã kết nối Cloud ✓');
        return true;
      } catch (error) {
        console.error('Cloud connection error:', error);
        updateCloudStatus(false, 'Lỗi kết nối Cloud: ' + error.message);
        return false;
      }
    }
    
    // User management functions
    function normalizeUser(user) {
      const email = (user && user.email) ? String(user.email).toLowerCase().trim() : '';
      return {
        uid: user.uid || null,
        name: user.name || '',
        user: user.user || '',
        email: email,
        role: user.role || 'user',
        isAdmin: Boolean(user.isAdmin || user.role === 'admin'),
        createdAt: user.createdAt || new Date().toISOString(),
        balance: Number(user.balance || 0)
      };
    }
    
    function userDocId(email) {
      if (!email) return 'unknown_user_' + Date.now();
      return String(email).trim().toLowerCase();
    }
    
    async function upsertCloudUser(user) {
      if (!db || !user?.email) {
        console.warn("⚠️ Không thể đồng bộ: Thiếu email hoặc DB chưa sẵn sàng", user);
        return;
      }
      try {
        const normalized = normalizeUser(user);
        const docId = normalized.uid || userDocId(normalized.email);
        await db.collection('users').doc(docId).set(normalized, { merge: true });
        console.log("✅ Đã đồng bộ lên Cloud cho:", normalized.email);
      } catch (err) {
        console.error("❌ Lỗi đồng bộ Cloud:", err);
      }
    }
    
    function loadLocalUsers() {
      try {
        return (JSON.parse(localStorage.getItem('mmo_users')) || []).map(normalizeUser);
      } catch (e) {
        return [];
      }
    }
    
    function setUsers(users) {
      usersCache = users.map(normalizeUser);
      localStorage.setItem('mmo_users', JSON.stringify(usersCache));
      usersCache.forEach((user) => {
        upsertCloudUser(user).catch(() => {});
      });
    }
    
    function getUsers() {
      return usersCache;
    }
    
    function getCurrentUser() {
      try { 
        return JSON.parse(localStorage.getItem('mmo_currentUser')) || null; 
      } catch(e) { 
        return null; 
      }
    }
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toast-msg');
      msg.textContent = message;
      toast.className = isError ? 'error show' : 'show';
      clearTimeout(window.adminToastTimer);
      window.adminToastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function logout() {
      if (auth) {
        auth.signOut().catch(() => {});
      }
      localStorage.removeItem('mmo_currentUser');
      window.location.href = 'auth.html?tab=login';
    }
    
    function redirectToAuth() {
      window.location.href = 'auth.html?tab=login';
    }
    
    async function ensureAdmin() {
      const currentUser = getCurrentUser();
      if (!currentUser) {
        alert('Chỉ admin mới được phép truy cập trang này.');
        redirectToAuth();
        return false;
      }
      
      if (!hasPermission(currentUser, 'viewReports') && currentUser.email.toLowerCase() !== ADMIN_EMAIL) {
        alert('Chỉ admin mới được phép truy cập trang này.');
        redirectToAuth();
        return false;
      }
      
      document.getElementById('admin-user').textContent = currentUser.name || currentUser.user || currentUser.email || 'Admin';
      return true;
    }
    
    function hasPermission(user, key) {
      if (!user) return false;
      if (user.role === 'admin' || user.isAdmin) return true;
      return false;
    }
    
    // Load and display users
    async function loadAccounts() {
      if (!(await ensureAdmin())) return;
      
      const users = getUsers().sort((a,b) => (a.email || '').localeCompare(b.email || ''));
      const body = document.getElementById('users-body');
      
      console.log('Loading accounts:', users.length, 'users:', users);
      
      if (!users.length) {
        // Create test users if none exist
        console.log('No users found, creating test users...');
        const testUsers = [
          {
            id: 'test_user_1',
            user: 'testuser1',
            email: 'testuser1@test.com',
            role: 'user',
            createdAt: new Date().toISOString(),
            balance: 100000
          },
          {
            id: 'test_premium_1', 
            user: 'testpremium1',
            email: 'testpremium1@test.com',
            role: 'premium',
            createdAt: new Date().toISOString(),
            balance: 500000
          },
          {
            id: 'test_admin_1',
            user: 'admin',
            email: 'admin@quochuy.mmo',
            role: 'admin',
            createdAt: new Date().toISOString(),
            balance: 1000000
          }
        ];
        
        const allUsers = [...testUsers];
        localStorage.setItem('mmo_users', JSON.stringify(allUsers));
        
        // Sync test users to cloud
        for (const user of testUsers) {
          await upsertCloudUser(user);
        }
        
        body.innerHTML = '<tr><td colspan="5" class="empty-state">Đã tạo tài khoản test. Đang tải lại...</td></tr>';
        
        setTimeout(() => {
          location.reload();
        }, 1000);
        return;
      }
      
      body.innerHTML = users.map(user => {
        const role = user.role || 'user';
        const createdDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('vi-VN') : '-';
        return `
        <tr>
          <td>${user.email || '-'}</td>
          <td>${user.user || '-'}</td>
          <td><span class="role-badge role-${role}">${role}</span></td>
          <td>${createdDate}</td>
          <td>
            <div class="role-actions">
              <button class="button-small details" onclick="selectUser('${user.email ? user.email.replace(/'/g, "\\'") : ''}')"><i class="fas fa-eye"></i> Xem</button>
              ${role === 'user' ? `<button class="role-btn btn-upgrade" onclick="upgradeToPremium('${user.id || user.email}')"><i class="fas fa-star"></i> Premium</button>` : ''}
              ${role === 'premium' ? `<button class="role-btn btn-downgrade" onclick="removePremium('${user.id || user.email}')"><i class="fas fa-star-half-alt"></i> Gỡ Premium</button>` : ''}
            </div>
          </td>
        </tr>`;
      }).join('');
    }
    
    // Create new user
    async function createNewUser() {
      const currentUser = getCurrentUser();
      if (!currentUser || !hasPermission(currentUser, 'manageUsers')) {
        showToast('Bạn không có quyền tạo tài khoản.', true);
        return;
      }
      
      const email = document.getElementById('new-email').value.trim();
      const username = document.getElementById('new-username').value.trim();
      const role = document.getElementById('new-role').value;
      const password = document.getElementById('new-password').value;
      
      if (!email || !username || !password) {
        showToast('Vui lòng nhập đầy đủ thông tin.', true);
        return;
      }
      
      const users = getUsers();
      if (users.find(u => u.email === email || u.user === username)) {
        showToast('Email hoặc username đã tồn tại.', true);
        return;
      }
      
      const newUser = {
        id: 'user_' + Date.now(),
        email: email,
        user: username,
        role: role,
        password: password,
        createdAt: new Date().toISOString(),
        balance: 0
      };
      
      users.push(newUser);
      setUsers(users);
      
      // Clear form
      document.getElementById('new-email').value = '';
      document.getElementById('new-username').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('new-role').value = 'user';
      
      showToast('✅ Đã tạo tài khoản mới thành công.');
      await loadAccounts();
    }
    
    // Role management
    async function upgradeToPremium(userId) {
      if (!confirm('Xác nhận nâng cấp user này lên Premium?')) return;
      
      const users = getUsers();
      const userIndex = users.findIndex(u => u.id === userId || u.email === userId);
      
      if (userIndex === -1) {
        showToast('Không tìm thấy người dùng.', true);
        return;
      }
      
      users[userIndex].role = 'premium';
      setUsers(users);
      
      await upsertCloudUser(users[userIndex]);
      showToast(`✅ Đã nâng cấp ${users[userIndex].email} lên Premium.`);
      await loadAccounts();
    }
    
    async function removePremium(userId) {
      if (!confirm('Xác nhận gỡ quyền Premium của user này?')) return;
      
      const users = getUsers();
      const userIndex = users.findIndex(u => u.id === userId || u.email === userId);
      
      if (userIndex === -1) {
        showToast('Không tìm thấy người dùng.', true);
        return;
      }
      
      users[userIndex].role = 'user';
      setUsers(users);
      
      await upsertCloudUser(users[userIndex]);
      showToast(`✅ Đã gỡ quyền Premium của ${users[userIndex].email}.`);
      await loadAccounts();
    }
    
    function selectUser(email) {
      const users = getUsers();
      const user = users.find(u => u.email === email);
      if (user) {
        showToast(`Đã chọn tài khoản: ${user.email} (${user.role})`);
      }
    }
    
    // Search functionality
    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('user-search');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          const searchTerm = this.value.toLowerCase();
          const rows = document.querySelectorAll('#users-body tr');
          
          rows.forEach(row => {
            const email = row.cells[0]?.textContent.toLowerCase() || '';
            const username = row.cells[1]?.textContent.toLowerCase() || '';
            const role = row.cells[2]?.textContent.toLowerCase() || '';
            
            if (email.includes(searchTerm) || username.includes(searchTerm) || role.includes(searchTerm)) {
              row.style.display = '';
            } else {
              row.style.display = 'none';
            }
          });
        });
      }
    });
    
    // Initialize
    async function initializeUsers() {
      const localUsers = loadLocalUsers();
      usersCache = localUsers;
      
      if (!db) {
        console.log('Firebase not configured, using local storage only');
        usersCache = localUsers;
        return;
      }
      
      try {
        console.log('Initializing Firebase sync...');
        updateCloudStatus(true, 'Đang đồng bộ với Firebase...');
        
        const cloudUsers = await fetchCloudUsers();
        console.log(`Fetched ${cloudUsers.length} users from Firebase`);
        
        const mergedUsers = [...localUsers, ...cloudUsers];
        usersCache = mergedUsers;
        
        localStorage.setItem('mmo_users', JSON.stringify(mergedUsers));
        console.log(`Merged users: ${mergedUsers.length} total`);
        
        updateCloudStatus(true, `Đồng bộ thành công (${mergedUsers.length} users)`);
      } catch (e) {
        console.error("Lỗi khi tải dữ liệu từ Cloud:", e);
        usersCache = localUsers;
      }
    }
    
    async function fetchCloudUsers() {
      if (!db) return [];
      const snap = await db.collection('users').get();
      return snap.docs.map(doc => normalizeUser({ uid: doc.id, ...doc.data() }));
    }
    
    const startAdmin = async () => {
      await testCloudConnection();
      
      if (auth) {
        await new Promise((resolve) => {
          const unsub = auth.onAuthStateChanged((fbUser) => {
            unsub();
            if (!fbUser) {
              redirectToAuth();
              resolve();
              return;
            }
            resolve();
          });
        });
      }
      
      await initializeUsers();
      await loadAccounts();
    };
    
    startAdmin().catch(() => {
      redirectToAuth();
    });
  </script>
</body>
