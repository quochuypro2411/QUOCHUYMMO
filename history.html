<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch sử giao dịch – QuocHuy.MMO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="history.css">
</head>
<body>
<canvas id="bg"></canvas>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">
    <img src="logo.png" alt="QuocHuy MMO" style="height: 42px; width: auto; display: block;">
  </a>
  <a href="index.html" class="topbar-back"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
</div>

<div class="history-wrap">
  <div class="page-header">
    <h1 class="page-title"><i class="fas fa-history"></i> Lịch sử giao dịch</h1>
    <div class="filters">
      <div class="filter-group">
        <i class="far fa-calendar-alt"></i>
        <input type="date" value="2026-04-01">
        <span style="color:var(--muted)">-</span>
        <input type="date" value="2026-04-22">
      </div>
      <div class="filter-group">
        <i class="fas fa-filter"></i>
        <select>
          <option>Tất cả trạng thái</option>
          <option>Thành công</option>
          <option>Đang xử lý</option>
          <option>Thất bại</option>
        </select>
      </div>
      <button class="filter-btn"><i class="fas fa-search"></i> Lọc</button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Mã GD</th>
            <th>Thời gian</th>
            <th>Sản phẩm / Dịch vụ</th>
            <th>Số tiền</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="history-table-body">
          <tr>
            <td colspan="6" style="text-align:center;padding:24px;color:#8b949e">Đang tải lịch sử giao dịch...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="page-info">Hiển thị 1-4 trong số 24 giao dịch</div>
      <div class="page-ctrls">
        <button class="page-btn" disabled><i class="fas fa-chevron-left"></i></button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn"><i class="fas fa-ellipsis-h"></i></button>
        <button class="page-btn">6</button>
        <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/sync.js"></script>
<script>
// Particles Background
const c=document.getElementById('bg'),x=c.getContext('2d');let W,H,ps=[];
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}rs();addEventListener('resize',rs);
for(let i=0;i<60;i++)ps.push({x:Math.random()*2e3,y:Math.random()*1200,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.8+.4,a:Math.random()*.5+.1});
(function d(){x.clearRect(0,0,W,H);for(const p of ps){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(14,165,233,${p.a})`;x.fill()}requestAnimationFrame(d)})();

function getCurrentUser(){
  try { return JSON.parse(localStorage.getItem('mmo_currentUser')) || null; } catch(e) { return null; }
}
const currentUser = getCurrentUser();
if (currentUser && (currentUser.role === 'admin' || currentUser.isAdmin)) {
  window.location.href = 'admin.html';
}
function fmtMoney(n){ return n.toLocaleString('vi-VN') + ' đ'; }
function statusClass(status){
  if(status.includes('Thành công')) return 'success';
  if(status.includes('Thất bại')) return 'failed';
  return 'pending';
}
function getUsers(){
  try { return JSON.parse(localStorage.getItem('mmo_users')) || []; } catch(e) { return []; }
}
function setUsers(users){
  localStorage.setItem('mmo_users', JSON.stringify(users));
}
function setCurrentUser(user){
  localStorage.setItem('mmo_currentUser', JSON.stringify(user));
}
function getAllOrders(){
  const users = getUsers();
  return users.flatMap(user => (user.orders || []).map(order => ({ ...order, customer: user.user || user.email || 'Khách hàng' })));
}
function updateOrderStatus(id, status){
  const currentUser = getCurrentUser();
  if(!currentUser) return alert('Vui lòng đăng nhập để quản lý đơn hàng.');
  if(currentUser.role !== 'admin') return alert('Chỉ admin mới được duyệt đơn hàng.');

  const users = getUsers();
  let updated = false;
  for(const user of users){
    if(!user.orders) continue;
    const order = user.orders.find(o => o.id === id);
    if(order){
      order.status = status;
      updated = true;
      break;
    }
  }
  if(!updated){
    return alert('Không tìm thấy đơn hàng.');
  }
  setUsers(users);
  setCurrentUser(currentUser);
  loadHistory();
  alert(`Đã cập nhật đơn hàng ${id} sang trạng thái: ${status}`);
}
function loadHistory(){
  const tbody = document.getElementById('history-table-body');
  const currentUser = getCurrentUser();
  const allOrders = currentUser && currentUser.role === 'admin' ? getAllOrders() : (currentUser ? (currentUser.orders || []) : []);
  if(!currentUser || !allOrders.length){
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:#8b949e">Chưa có giao dịch nào. Hãy đăng nhập và đặt hàng để bắt đầu.</td></tr>`;
    return;
  }
  const rows = allOrders.slice().reverse().map(order => {
    const item = order.items[0] || {};
    const productName = item.name ? `${item.name}${order.items.length > 1 ? ' và ' + (order.items.length - 1) + ' sản phẩm khác' : ''}` : 'Đơn hàng';
    const productDesc = item.desc || '';
    const date = new Date(order.ts).toLocaleString('vi-VN');
    const cls = statusClass(order.status);
    const isAdmin = currentUser.role === 'admin';
    const userInfo = isAdmin ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">Khách hàng: ${order.customer || 'Không rõ'}</div>` : '';
    const actions = (isAdmin && order.status === 'Đang xử lý')
      ? `
          <button class="action-btn" title="Duyệt đơn" onclick="updateOrderStatus('${order.id}','Thành công')"><i class="fas fa-check-circle"></i></button>
          <button class="action-btn" title="Từ chối đơn" onclick="updateOrderStatus('${order.id}','Thất bại')"><i class="fas fa-times-circle"></i></button>`
      : `<button class="action-btn" title="Xem chi tiết"><i class="fas fa-eye"></i></button>`;
    return `
      <tr>
        <td class="col-id">${order.id}</td>
        <td class="col-date">${date}</td>
        <td>
          <div class="col-prod">
            <div class="prod-icon" style="background:linear-gradient(135deg,#0ea5e9,#2563eb)"><i class="fas fa-box-open"></i></div>
            <div>
              <div class="prod-name">${productName}</div>
              <div style="font-size:11px;color:var(--muted)">${productDesc}${userInfo}</div>
            </div>
          </div>
        </td>
        <td class="col-amount">${fmtMoney(order.total)}</td>
        <td><span class="status ${cls}"><i class="fas ${cls === 'success' ? 'fa-check' : cls === 'failed' ? 'fa-times' : 'fa-spinner fa-spin'}"></i> ${order.status}</span></td>
        <td>${actions}</td>
      </tr>`;
  });
  tbody.innerHTML = rows.join('');
}
loadHistory();
</script>
</body>
</html>
